<nav class="app-paginator" aria-label="Paginacion">
  <div class="paginator-summary">
    <span>{{ rangeLabel }}</span>
  </div>

  <div class="paginator-pages" aria-label="Paginas">
    <button
      type="button"
      class="page-nav-button"
      [disabled]="currentPage === 1"
      aria-label="Pagina anterior"
      (click)="goToPage(currentPage - 1)">
      <span aria-hidden="true">‹</span>
    </button>

    @for (item of pages; track $index) {
      @if (item === 'ellipsis') {
        <span class="page-ellipsis" aria-hidden="true">...</span>
      } @else {
        <button
          type="button"
          class="page-number-button"
          [class.active]="item === currentPage"
          [attr.aria-current]="item === currentPage ? 'page' : null"
          [attr.aria-label]="'Pagina ' + item"
          (click)="goToPage(item)">
          {{ item }}
        </button>
      }
    }

    <button
      type="button"
      class="page-nav-button"
      [disabled]="currentPage === totalPages"
      aria-label="Pagina siguiente"
      (click)="goToPage(currentPage + 1)">
      <span aria-hidden="true">›</span>
    </button>
  </div>

  <label class="page-size-control">
    <span>Filas</span>
    <select [value]="pageSize" (change)="updatePageSize($any($event.target).value)">
      @for (option of pageSizeOptions; track option) {
        <option [value]="option" [selected]="option === pageSize">{{ option }}</option>
      }
    </select>
  </label>
</nav>
