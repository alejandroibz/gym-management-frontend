<mat-sidenav-container class="app-container" autosize>
  <mat-sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="isMobile ? isMobileSidebarOpen : true"
    [class.collapsed]="isCollapsed"
    class="app-sidenav">
    <div class="sidebar-content">
      <div class="sidebar-header">
        <div class="brand">
          <p class="brand-kicker" *ngIf="!isCollapsed">Panel interno</p>
          <h2>{{ isCollapsed ? 'GA' : 'Gym Admin' }}</h2>
        </div>

        <button
          mat-icon-button
          type="button"
          class="collapse-button"
          (click)="toggleSidebar()"
          [attr.aria-label]="isMobile ? 'Cerrar menu lateral' : 'Colapsar menu lateral'">
          <mat-icon>{{ isMobile ? 'close' : 'menu' }}</mat-icon>
        </button>
      </div>

      <div class="sidebar-section-label" *ngIf="!isCollapsed">Principal</div>

      <mat-nav-list class="nav-list">
        <a
          mat-list-item
          routerLink="/dashboard"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>dashboard</mat-icon>
            <span class="nav-text">Dashboard</span>
          </div>
        </a>

        <a
          mat-list-item
          routerLink="/employees"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>groups</mat-icon>
            <span class="nav-text">Empleados</span>
          </div>
        </a>

        <a
          mat-list-item
          routerLink="/clients"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>person</mat-icon>
            <span class="nav-text">Clientes</span>
          </div>
        </a>

        <a
          mat-list-item
          routerLink="/movements"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>payments</mat-icon>
            <span class="nav-text">Movimientos</span>
          </div>
        </a>
      </mat-nav-list>

      <div class="sidebar-footer" *ngIf="!isCollapsed">
        <div class="footer-dot"></div>
        <div>
          <strong>Gestion central</strong>
          <p>Accesos rapidos del sistema</p>
        </div>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      @if (isMobile) {
        <button
          mat-icon-button
          type="button"
          class="mobile-menu-button"
          (click)="toggleSidebar()"
          aria-label="Abrir menu lateral">
          <mat-icon>menu</mat-icon>
        </button>
      }

      <span class="toolbar-title">Sistema de Gestion de Gimnasio</span>
    </mat-toolbar>

    <main class="app-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
