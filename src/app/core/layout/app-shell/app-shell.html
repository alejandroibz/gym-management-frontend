<mat-sidenav-container class="app-container" autosize>
  <mat-sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="isMobile ? isMobileSidebarOpen : true"
    [class.collapsed]="isCollapsed"
    class="app-sidenav">
    <div class="sidebar-content">
      <div class="sidebar-header">
        <div class="brand">
          <img
            class="brand-logo"
            src="images/gymLogo.png"
            alt="Gym Admin"
            width="160"
            height="56">
        </div>

        <button
          mat-icon-button
          type="button"
          class="collapse-button"
          (click)="toggleSidebar()"
          [attr.aria-label]="isMobile ? 'Cerrar menu lateral' : 'Colapsar menu lateral'">
          <mat-icon>{{ isMobile ? 'close' : 'menu' }}</mat-icon>
        </button>
      </div>

      <div class="sidebar-section-label" *ngIf="!isCollapsed">Principal</div>

      <mat-nav-list class="nav-list">
        <a
          *ngIf="isSuperAdmin$ | async"
          mat-list-item
          routerLink="/dashboard"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>dashboard</mat-icon>
            <span class="nav-text">Dashboard</span>
          </div>
        </a>

        <a
          *ngIf="isSuperAdmin$ | async"
          mat-list-item
          routerLink="/employees"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>groups</mat-icon>
            <span class="nav-text">Empleados</span>
          </div>
        </a>

        <a
          *ngIf="isAdminOrSuperAdmin$ | async"
          mat-list-item
          routerLink="/clients"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>person</mat-icon>
            <span class="nav-text">Clientes</span>
          </div>
        </a>

        <a
          *ngIf="isAdminOrSuperAdmin$ | async"
          mat-list-item
          routerLink="/health"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>health_and_safety</mat-icon>
            <span class="nav-text">Salud</span>
          </div>
        </a>

        <a
          *ngIf="isSuperAdmin$ | async"
          mat-list-item
          routerLink="/movements"
          routerLinkActive="active-link"
          (click)="closeSidebarOnMobile()">
          <div class="nav-item-content">
            <mat-icon>payments</mat-icon>
            <span class="nav-text">Movimientos</span>
          </div>
        </a>
      </mat-nav-list>

      <div class="sidebar-footer">
        @if (!isCollapsed && (user$ | async); as user) {
          <div class="sidebar-session-card">
            <div class="session-heading">
              <div class="footer-dot"></div>
              <div>
                <strong>Gestión central</strong>
                <p>{{ getUserDisplayName(user) }}</p>
              </div>
            </div>

            <button
              mat-stroked-button
              type="button"
              class="logout-button"
              (click)="logout()">
              <mat-icon>logout</mat-icon>
              <span>Cerrar sesión</span>
            </button>
          </div>
        } @else {
          <button
            mat-stroked-button
            type="button"
            class="logout-button"
            (click)="logout()"
            [attr.aria-label]="isCollapsed ? 'Cerrar sesión' : null">
            <mat-icon>logout</mat-icon>
          </button>
        }
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      @if (isMobile) {
        <button
          mat-icon-button
          type="button"
          class="mobile-menu-button"
          (click)="toggleSidebar()"
          aria-label="Abrir menu lateral">
          <mat-icon>menu</mat-icon>
        </button>
      }

      <div class="toolbar-brand">
        <img
          class="toolbar-logo"
          src="images/gymLogoBlack.png"
          alt=""
          width="28"
          height="28">
        <span class="toolbar-title">Sistema de Gestión de Gimnasio</span>
      </div>
    </mat-toolbar>

    <main class="app-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
