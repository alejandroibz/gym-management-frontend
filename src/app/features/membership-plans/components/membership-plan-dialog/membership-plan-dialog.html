<div class="dialog-shell">
  <div class="dialog-header">
    <div>
      <p class="dialog-eyebrow">ABM de planes</p>
      <h2>{{ isEditing ? 'Editar plan' : 'Nuevo plan' }}</h2>
      <p class="dialog-subtitle">Completa los datos comerciales principales del plan.</p>
    </div>

    <button mat-icon-button type="button" aria-label="Cerrar modal" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form class="dialog-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-grid">
      <mat-form-field appearance="outline" class="span-2">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="span-2">
        <mat-label>Descripción</mat-label>
        <textarea matInput rows="4" formControlName="descripcion"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio</mat-label>
        <input matInput type="number" min="0" step="0.01" formControlName="precio" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Duracion en dias</mat-label>
        <input matInput type="number" min="1" step="1" formControlName="duracionDias" />
      </mat-form-field>
    </div>

    <div class="dialog-actions">
      <button mat-stroked-button type="button" (click)="close()">Cancelar</button>
      <button mat-flat-button type="submit">
        <mat-icon>{{ isEditing ? 'save' : 'add' }}</mat-icon>
        {{ isEditing ? 'Guardar cambios' : 'Crear plan' }}
      </button>
    </div>
  </form>
</div>
